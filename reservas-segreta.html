<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservas | Segreta Pizza &amp; Bar</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/assets/img/segreta-isotipo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Red+Hat+Display:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css?v=8" />
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><img src="/assets/img/segreta-logo.png" alt="Segreta" width="160" height="34" /></a>
      <div class="nav-right">
        <a href="/reservas" class="btn btn-primary">Reservar</a>
      </div>
    </div>
  </nav>

  <section class="page-hero">
    <div class="hero-bg" style="background-image: url('/assets/img/segreta-bar.jpg');"></div>
    <div class="page-hero-content">
      <span class="label">Reservas</span>
      <h1>Reserva tu Mesa</h1>
      <p style="margin-top:0.5rem; color: var(--cream-dim); font-size:0.9rem;">Alonso de Córdova 3080, Vitacura · +56 9 7630 1208</p>
    </div>
  </section>

  <!-- IFRAME COVERMANAGER con parámetro de campaña -->
  <section style="padding-block: 0; background: var(--noir-mid);">
    <div class="iframe-container" style="min-height: 700px;">
      <iframe
        src="https://www.covermanager.com/reservation/module_restaurant/restaurante-segreta-pizzeria/spanish?source=Campanas_reserva"
        title="Reservas Segreta — Campaña"
        loading="lazy"
        allow="payment"
      ></iframe>
    </div>
  </section>

  <script src="/js/main.js"></script>
</body>
</html>
