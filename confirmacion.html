<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva Confirmada | Segreta Pizza &amp; Bar</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/assets/img/segreta-isotipo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Red+Hat+Display:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .confirmacion-wrap {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--nav-h) var(--gutter) 4rem;
    }
    .confirmacion-box {
      max-width: 500px;
    }
    .confirmacion-box .checkmark {
      width: 60px;
      height: 60px;
      border: 1px solid var(--ochre);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 1.5rem;
      color: var(--ochre-light);
    }
    .confirmacion-box h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: var(--cream);
      margin-bottom: 1rem;
    }
    .confirmacion-box p {
      margin-inline: auto;
      margin-bottom: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo"><img src="/assets/img/segreta-logo.png" alt="Segreta" width="160" height="34" /></a>
    </div>
  </nav>

  <div class="confirmacion-wrap">
    <div class="confirmacion-box">
      <div class="checkmark">✓</div>
      <h1>Reserva Confirmada</h1>
      <p>Tu reserva ha sido recibida. Pronto recibirás una confirmación en tu email. ¡Te esperamos!</p>
      <a href="/" class="btn btn-primary">Volver al inicio</a>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
